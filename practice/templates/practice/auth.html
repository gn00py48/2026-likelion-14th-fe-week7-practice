{% extends 'practice/base.html' %}
{% block content %}
    <section class="hero">
        <p class="eyebrow">FE 7주차 Form 실습</p>
        <h1>Form 태그로 회원가입과 로그인을 구현해봅시다</h1>
        <p>
            힌트 : action, method, name, submit, csrf_token, required
        </p>
    </section>

    <section class="auth-layout">
        <div class="auth-card">
            <h2>회원가입</h2>
            <p class="card-desc">새로운 계정을 DB에 저장합니다.</p>
            <form action="{% url 'practice:signup' %}" method="POST" class="form-box">
            {% csrf_token %}
            <div class="form-group">
                <label for="signup-username">아이디</label>
                <input
                id="signup-username"
                type="text"
                name="username"
                placeholder="아이디를 입력해주세요"
                required
                >
            </div>
            <div class="form-group">
                <label for="signup-password">비밀번호</label>
                <input
                id="signup-password"
                type="password"
                name="password"
                placeholder="비밀번호를 입력해주세요"
                required
                >
            </div>
            <button type="submit" class="primary-button">
                회원가입
            </button>
            </form>
        </div>

        <div class="auth-card">
            <h2>로그인</h2>
            <p class="card-desc">저장된 계정 정보와 비교합니다.</p>
            <form action="{% url 'practice:login' %}" method="POST" class="form-box">
            {% csrf_token %}
            <div class="form-group">
                <label for="login-username">아이디</label>
                <input
                id="login-username"
                type="text"
                name="username"
                placeholder="아이디를 입력해주세요"
                required
                >
            </div>
            <div class="form-group">
                <label for="login-password">비밀번호</label>
                <input
                id="login-password"
                type="password"
                name="password"
                placeholder="비밀번호를 입력해주세요"
                required
                >
            </div>
            <button type="submit" class="primary-button">
                로그인
            </button>
            </form>
        </div>
    </section>
{% endblock %}
